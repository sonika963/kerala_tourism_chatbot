<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Kerala Tourism</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a; /* Dark professional background */
        }
        .admin-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .admin-box h2 {
            color: #2d5a27;
            margin-bottom: 20px;
            border-bottom: 2px solid #2d5a27;
            padding-bottom: 10px;
        }
        .admin-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .admin-box button {
            width: 100%;
            padding: 12px;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .admin-box button:hover {
            background: #23471e;
        }
        .error-msg {
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-box">
            <h2>Admin Login</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <p class="error-msg">{{ message }}</p>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/admin/login" method="POST">
                <input type="text" name="username" placeholder="Admin Username" required>
                <input type="password" name="password" placeholder="Admin Password" required>
                <button type="submit">Access Dashboard</button>
            </form>

            <a href="/" class="back-link">← Return to Main Site</a>
        </div>
    </div>
</body>
</html>
